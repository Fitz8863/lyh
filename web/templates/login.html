<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - VisionGuard AI 跌倒检测系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/bootstrap.min.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #f97316;
            --primary-dark: #c2410c;
            --primary-light: #fed7aa;
            --accent-color: #38bdf8;
            --bg-dark: rgba(12, 18, 28, 0.56);
            --bg-card: rgba(11, 17, 27, 0.76);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(148, 163, 184, 0.2);
        }
        
        body {
            background-color: #050a12;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: "Microsoft YaHei", -apple-system, sans-serif;
            color: var(--text-primary);
            transition: background-image 0.5s ease-in-out;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, rgba(5,10,18,0.56), rgba(5,10,18,0.82));
            pointer-events: none;
        }
        
        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            box-shadow: 0 32px 60px rgba(2, 6, 23, 0.52);
            overflow: hidden;
            max-width: 460px;
            width: 100%;
            animation: fadeIn 0.6s ease;
            position: relative;
            z-index: 1;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-header {
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.92) 0%, rgba(194, 65, 12, 0.92) 48%, rgba(14, 165, 233, 0.9) 100%);
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .login-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .login-header h3 {
            color: white;
            font-weight: 700;
            font-size: 1.5rem;
            margin: 0;
            position: relative;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .login-header p {
            color: rgba(255,255,255,0.9);
            margin-top: 8px;
            position: relative;
        }
        
        .login-header i {
            font-size: 2.5rem;
            margin-bottom: 15px;
            display: block;
            position: relative;
        }
        
        .login-body {
            padding: 35px;
        }
        
        .form-control {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 10px;
            padding: 14px 16px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.18);
            background: var(--bg-card);
            color: var(--text-primary);
            outline: none;
        }
        
        .form-control::placeholder {
            color: var(--text-secondary);
        }
        
        .form-label {
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .form-check-input {
            background-color: var(--bg-dark);
            border-color: var(--border-color);
        }
        
        .form-check-input:checked {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }
        
        .form-check-label {
            color: var(--text-secondary);
        }
        
        .btn-login {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            border: none;
            color: white;
            padding: 14px;
            font-weight: 600;
            border-radius: 14px;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 12px 24px rgba(249, 115, 22, 0.24);
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 28px rgba(249, 115, 22, 0.3);
            background: linear-gradient(135deg, #fb923c 0%, #f97316 100%);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        hr {
            border-color: var(--border-color);
            margin: 25px 0;
        }
        
        .text-center {
            color: var(--text-secondary);
        }
        
        .text-center a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .text-center a:hover {
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(244, 114, 182, 0.5);
        }
        
        .alert {
            border-radius: 10px;
            border: none;
        }
        
        .alert-danger {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border-left: 4px solid #ef4444;
        }
        
        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border-left: 4px solid #10b981;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-user-injured"></i>
            <h3>VisionGuard AI</h3>
            <p>跌倒检测系统控制台</p>
        </div>
        <div class="login-body">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'danger' else 'success' }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" style="filter: invert(1);"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-user me-2"></i>用户名或邮箱</label>
                    <input type="text" name="username" class="form-control" placeholder="请输入用户名或邮箱" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-lock me-2"></i>密码</label>
                    <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" name="remember" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">记住我</label>
                </div>
                <button type="submit" class="btn btn-login w-100">
                    <i class="fas fa-sign-in-alt me-2"></i>登 录
                </button>
            </form>
            <hr>
            <p class="text-center mb-0">
                还没有账号? <a href="{{ url_for('auth.register') }}">立即注册</a>
            </p>
        </div>
    </div>
    <script>
        // 随机背景图逻辑
        document.addEventListener('DOMContentLoaded', function() {
            const backgrounds = [
                "{{ url_for('static', filename='image/background1.jpg') }}",
                "{{ url_for('static', filename='image/background2.jpg') }}",
                "{{ url_for('static', filename='image/background3.jpg') }}"
            ];
            const randomIdx = Math.floor(Math.random() * backgrounds.length);
            document.body.style.backgroundImage = `url('${backgrounds[randomIdx]}')`;
        });
    </script>
    <script src="{{ url_for('static', filename='bootstrap/bootstrap.bundle.min.js') }}"></script>
</body>
</html>
